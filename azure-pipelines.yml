# Azure DevOps — Dev & QA pipeline
# Auto: push to dev branch → build, test, deploy Dev + QA
# Manual: Run pipeline → pick branch → toggle Deploy to Dev / QA checkboxes

trigger:
  branches:
    include:
      - dev

pr:
  branches:
    include:
      - dev

parameters:
  - name: deployToDev
    displayName: Deploy to Dev (manual runs only)
    type: boolean
    default: true
  - name: deployToQA
    displayName: Deploy to QA (manual runs only)
    type: boolean
    default: true

variables:
  dotnetVersion: '8.0.x'
  buildConfiguration: Release
  apiProject: StudentManagementApi/StudentManagementApi.csproj
  testProject: StudentManagementApi.Tests/StudentManagementApi.Tests.csproj
  azureServiceConnection: StudentManagement-Azure

stages:
  - stage: Build
    displayName: Build and Test
    pool:
      vmImage: ubuntu-latest
    jobs:
      - job: BuildAndTest
        displayName: Restore, build, test, publish
        cancelTimeoutInMinutes: 1
        steps:
          - checkout: self
            displayName: Checkout source

          - task: UseDotNet@2
            displayName: Install .NET SDK
            condition: succeeded()
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore
            condition: succeeded()
            inputs:
              command: restore
              projects: |
                $(apiProject)
                $(testProject)
                StudentManagement.Database/StudentManagement.Database.csproj

          - task: DotNetCoreCLI@2
            displayName: Build
            condition: succeeded()
            inputs:
              command: build
              projects: |
                $(apiProject)
                $(testProject)
                StudentManagement.Database/StudentManagement.Database.csproj
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Test
            condition: succeeded()
            inputs:
              command: test
              projects: $(testProject)
              arguments: --configuration $(buildConfiguration) --no-build --logger trx
              publishTestResults: true

          - task: DotNetCoreCLI@2
            displayName: Publish API
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              command: publish
              publishWebProjects: false
              projects: $(apiProject)
              arguments: --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api /p:UseAppHost=false
              zipAfterPublish: false

          - task: PublishPipelineArtifact@1
            displayName: Publish API artifact
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)/api
              artifact: api
              publishLocation: pipeline

          - task: PublishPipelineArtifact@1
            displayName: Publish database scripts artifact
            condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
            inputs:
              targetPath: StudentManagement.Database
              artifact: database
              publishLocation: pipeline

  - stage: DeployDev
    displayName: Deploy Dev
    dependsOn: Build
    condition: |
      and(
        succeeded('Build'),
        ne(variables['Build.Reason'], 'PullRequest'),
        or(
          and(eq(variables['Build.SourceBranch'], 'refs/heads/dev'), in(variables['Build.Reason'], 'IndividualCI', 'BatchedCI')),
          and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.deployToDev }}', 'True'))
        )
      )
    variables:
      - group: StudentManagement-Dev
    pool:
      vmImage: ubuntu-latest
    jobs:
      - deployment: DeployDev
        displayName: Deploy database and API to Dev
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: pipelines/templates/deploy-database.yml
                  parameters:
                    azureServiceConnection: $(azureServiceConnection)

                - template: pipelines/templates/deploy-api.yml
                  parameters:
                    azureServiceConnection: $(azureServiceConnection)
                    azureWebAppName: $(azureWebAppName)
                    aspnetcoreEnvironment: Development
                    apiConnectionString: $(apiConnectionString)
                    artifactName: api

  - stage: DeployQA
    displayName: Deploy QA
    dependsOn:
      - Build
      - DeployDev
    condition: |
      and(
        succeeded('Build'),
        or(succeeded('DeployDev'), eq(dependencies.DeployDev.result, 'Skipped')),
        ne(variables['Build.Reason'], 'PullRequest'),
        or(
          and(eq(variables['Build.SourceBranch'], 'refs/heads/dev'), in(variables['Build.Reason'], 'IndividualCI', 'BatchedCI')),
          and(eq(variables['Build.Reason'], 'Manual'), eq('${{ parameters.deployToQA }}', 'True'))
        )
      )
    variables:
      - group: StudentManagement-QA
    pool:
      vmImage: ubuntu-latest
    jobs:
      - deployment: DeployQA
        displayName: Deploy database and API to QA
        environment: qa
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: pipelines/templates/deploy-database.yml
                  parameters:
                    azureServiceConnection: $(azureServiceConnection)

                - template: pipelines/templates/deploy-api.yml
                  parameters:
                    azureServiceConnection: $(azureServiceConnection)
                    azureWebAppName: $(azureWebAppName)
                    aspnetcoreEnvironment: QA
                    apiConnectionString: $(apiConnectionString)
                    artifactName: api
