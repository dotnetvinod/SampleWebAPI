name: CI/CD — Dev & QA

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'
  API_PROJECT: StudentManagementApi/StudentManagementApi.csproj
  TEST_PROJECT: StudentManagementApi.Tests/StudentManagementApi.Tests.csproj
  PUBLISH_DIR: artifacts/api

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --output ${{ env.PUBLISH_DIR }} /p:UseAppHost=false

      - name: Package database scripts
        run: |
          mkdir -p artifacts/database
          cp -r StudentManagement.Database/Scripts artifacts/database/
          cp -r StudentManagement.Database/deploy artifacts/database/

      - name: Upload API artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: api-release
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 7

      - name: Upload database artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: database-scripts
          path: artifacts/database
          retention-days: 7

  deploy-dev:
    name: Deploy — Dev
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-release
          path: artifacts/api

      - name: Deploy database (Dev)
        uses: ./.github/actions/deploy-database
        with:
          server: ${{ secrets.SQL_SERVER }}
          database: ${{ secrets.SQL_DATABASE }}
          username: ${{ secrets.SQL_USERNAME }}
          password: ${{ secrets.SQL_PASSWORD }}

      - name: Deploy API (Dev)
        uses: ./.github/actions/deploy-api-azure
        with:
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          webapp-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package-path: artifacts/api
          aspnetcore-environment: Development
          connection-string: ${{ secrets.API_CONNECTION_STRING }}

  deploy-qa:
    name: Deploy — QA
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-release
          path: artifacts/api

      - name: Deploy database (QA)
        uses: ./.github/actions/deploy-database
        with:
          server: ${{ secrets.SQL_SERVER }}
          database: ${{ secrets.SQL_DATABASE }}
          username: ${{ secrets.SQL_USERNAME }}
          password: ${{ secrets.SQL_PASSWORD }}

      - name: Deploy API (QA)
        uses: ./.github/actions/deploy-api-azure
        with:
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          webapp-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package-path: artifacts/api
          aspnetcore-environment: QA
          connection-string: ${{ secrets.API_CONNECTION_STRING }}
