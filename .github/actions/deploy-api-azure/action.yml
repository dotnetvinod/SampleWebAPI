name: Deploy API to Azure Web App
description: Deploy published API artifact to Azure App Service

inputs:
  azure-credentials:
    description: Azure service principal credentials JSON
    required: true
  webapp-name:
    description: Azure Web App name
    required: true
  package-path:
    description: Path to published API package
    required: true
  aspnetcore-environment:
    description: ASPNETCORE_ENVIRONMENT value
    required: true
  connection-string:
    description: SQL connection string for the API
    required: true

runs:
  using: composite
  steps:
    - name: Azure login
      uses: azure/login@v2
      with:
        creds: ${{ inputs.azure-credentials }}

    - name: Configure app settings
      uses: azure/appservice-settings@v1
      with:
        app-name: ${{ inputs.webapp-name }}
        app-settings-json: |
          [
            {
              "name": "ASPNETCORE_ENVIRONMENT",
              "value": "${{ inputs.aspnetcore-environment }}",
              "slotSetting": false
            },
            {
              "name": "ConnectionStrings__DefaultConnection",
              "value": "${{ inputs.connection-string }}",
              "slotSetting": false
            }
          ]

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ inputs.webapp-name }}
        package: ${{ inputs.package-path }}
