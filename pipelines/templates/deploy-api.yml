parameters:
  - name: azureServiceConnection
    type: string
  - name: azureWebAppName
    type: string
  - name: aspnetcoreEnvironment
    type: string
  - name: apiConnectionString
    type: string
  - name: pipelineResource
    type: string
    default: ''
  - name: artifactName
    type: string
    default: api

steps:
  - ${{ if eq(parameters.pipelineResource, '') }}:
    - download: current
      artifact: ${{ parameters.artifactName }}
      condition: succeeded()

  - ${{ if ne(parameters.pipelineResource, '') }}:
    - download: ${{ parameters.pipelineResource }}
      artifact: ${{ parameters.artifactName }}
      condition: succeeded()

  - task: PowerShell@2
    displayName: Set package path
    condition: succeeded()
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $artifact = '${{ parameters.artifactName }}'
        $resource = '${{ parameters.pipelineResource }}'
        if ([string]::IsNullOrWhiteSpace($resource)) {
          $path = "$(Pipeline.Workspace)/$artifact"
        } else {
          $path = "$(Pipeline.Workspace)/$resource/$artifact"
        }
        Write-Host "Package path: $path"
        Write-Host "##vso[task.setvariable variable=packagePath]$path"

  - task: AzureAppServiceSettings@1
    displayName: Configure App Service settings
    condition: succeeded()
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      appName: ${{ parameters.azureWebAppName }}
      resourceGroupName: ''
      appSettings: |
        [
          {
            "name": "ASPNETCORE_ENVIRONMENT",
            "value": "${{ parameters.aspnetcoreEnvironment }}",
            "slotSetting": false
          },
          {
            "name": "ConnectionStrings__DefaultConnection",
            "value": "${{ parameters.apiConnectionString }}",
            "slotSetting": false
          }
        ]

  - task: AzureWebApp@1
    displayName: Deploy API to Azure Web App
    condition: succeeded()
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      appType: webApp
      appName: ${{ parameters.azureWebAppName }}
      package: $(packagePath)
