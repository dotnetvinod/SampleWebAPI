parameters:
  - name: azureServiceConnection
    type: string
  - name: aspnetcoreEnvironment
    type: string
  - name: pipelineResource
    type: string
    default: ''
  - name: artifactName
    type: string
    default: api

steps:
  - ${{ if eq(parameters.pipelineResource, '') }}:
    - download: current
      artifact: ${{ parameters.artifactName }}

  - ${{ if ne(parameters.pipelineResource, '') }}:
    - download: ${{ parameters.pipelineResource }}
      artifact: ${{ parameters.artifactName }}

  - task: PowerShell@2
    displayName: Set package path
    condition: succeeded()
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $artifact = '${{ parameters.artifactName }}'
        $resource = '${{ parameters.pipelineResource }}'
        if ([string]::IsNullOrWhiteSpace($resource)) {
          $path = "$(Pipeline.Workspace)/$artifact"
        } else {
          $path = "$(Pipeline.Workspace)/$resource/$artifact"
        }
        Write-Host "Package path: $path"
        Write-Host "##vso[task.setvariable variable=packagePath]$path"

  - task: AzureCLI@2
    displayName: Configure and deploy Web App
    condition: succeeded()
    env:
      DEPLOY_WEBAPP_NAME: $(azureWebAppName)
      DEPLOY_WEBAPP_RESOURCE_GROUP: $(azureResourceGroup)
      DEPLOY_ASPNETCORE_ENVIRONMENT: ${{ parameters.aspnetcoreEnvironment }}
      DEPLOY_CONNECTION_STRING: $(apiConnectionString)
      DEPLOY_PACKAGE_PATH: $(packagePath)
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: scriptPath
      scriptPath: $(Build.SourcesDirectory)/StudentManagement.Database/deploy/Deploy-WebApp.ps1
