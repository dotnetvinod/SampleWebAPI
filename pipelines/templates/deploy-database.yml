parameters:
  - name: azureServiceConnection
    type: string
    default: 'StudentManagement-Azure'

steps:
  - task: AzureCLI@2
    displayName: Open SQL firewall for pipeline agent (optional)
    condition: and(succeeded(), eq(variables['enableAutomatedSqlFirewall'], 'true'))
    env:
      DEPLOY_SQL_SERVER: $(sqlServer)
      DEPLOY_SQL_RESOURCE_GROUP: $(sqlResourceGroup)
      DEPLOY_BUILD_ID: $(Build.BuildId)
      DEPLOY_SERVICE_CONNECTION: ${{ parameters.azureServiceConnection }}
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: scriptPath
      scriptPath: $(Build.SourcesDirectory)/StudentManagement.Database/deploy/Open-SqlFirewallForAgent.ps1

  - task: PowerShell@2
    displayName: Install sqlcmd (Linux)
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))
    inputs:
      targetType: inline
      script: |
        if (-not (Get-Command sqlcmd -ErrorAction SilentlyContinue)) {
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "##vso[task.prependpath]/opt/mssql-tools18/bin"
        }

  - task: PowerShell@2
    displayName: Deploy database scripts
    condition: succeeded()
    env:
      DEPLOY_SQL_SERVER: $(sqlServer)
      DEPLOY_SQL_DATABASE: $(sqlDatabase)
      DEPLOY_SQL_USERNAME: $(sqlUsername)
      SQL_PASSWORD: $(sqlPassword)
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $ErrorActionPreference = 'Stop'
        $sqlServer = $env:DEPLOY_SQL_SERVER
        if ($sqlServer -match 'database\.windows\.net') {
          Write-Host 'Azure SQL: ensure SQL Server firewall allows pipeline agent IPs (see docs/CICD.md).'
        }
        $scriptParams = @{
          Server   = $sqlServer
          Database = $env:DEPLOY_SQL_DATABASE
          Username = $env:DEPLOY_SQL_USERNAME
          Password = $env:SQL_PASSWORD
        }
        if ($sqlServer -match 'database\.windows\.net') {
          $scriptParams.TrustServerCertificate = $true
        }
        & '$(Build.SourcesDirectory)/StudentManagement.Database/deploy/Deploy-Database.ps1' @scriptParams

  - task: AzureCLI@2
    displayName: Close SQL firewall for pipeline agent (optional)
    condition: and(always(), eq(variables['enableAutomatedSqlFirewall'], 'true'), eq(variables['sqlFirewallManaged'], 'true'), ne(variables['sqlFirewallRuleName'], ''))
    env:
      DEPLOY_SQL_RESOURCE_GROUP: $(sqlResourceGroupResolved)
      DEPLOY_SQL_SERVER_SHORT_NAME: $(sqlServerShortName)
      DEPLOY_SQL_FIREWALL_RULE_NAME: $(sqlFirewallRuleName)
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: scriptPath
      scriptPath: $(Build.SourcesDirectory)/StudentManagement.Database/deploy/Close-SqlFirewallForAgent.ps1
