parameters:
  - name: sqlServer
    type: string
  - name: sqlDatabase
    type: string
  - name: sqlUsername
    type: string
  - name: sqlPassword
    type: string
  - name: azureServiceConnection
    type: string
    default: ''
  - name: sqlResourceGroup
    type: string
    default: ''

steps:
  - task: AzureCLI@2
    displayName: Allow agent IP on SQL Server firewall
    condition: and(succeeded(), ne('${{ parameters.azureServiceConnection }}', ''), ne('${{ parameters.sqlResourceGroup }}', ''))
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $agentIp = (Invoke-RestMethod -Uri 'https://api.ipify.org?format=text').Trim()
        $serverName = '${{ parameters.sqlServer }}'.Split('.')[0]
        $ruleName = "ado-build-$(Build.BuildId)"
        Write-Host "Agent IP: $agentIp"
        Write-Host "SQL server: $serverName"
        Write-Host "Firewall rule: $ruleName"
        az sql server firewall-rule create `
          --resource-group '${{ parameters.sqlResourceGroup }}' `
          --server $serverName `
          --name $ruleName `
          --start-ip-address $agentIp `
          --end-ip-address $agentIp
        Write-Host "##vso[task.setvariable variable=sqlFirewallRuleName]$ruleName"
        Write-Host "##vso[task.setvariable variable=sqlServerShortName]$serverName"
        Write-Host "Waiting 10 seconds for firewall rule to propagate..."
        Start-Sleep -Seconds 10

  - task: PowerShell@2
    displayName: Install sqlcmd (Linux)
    condition: eq(variables['Agent.OS'], 'Linux')
    inputs:
      targetType: inline
      script: |
        if (-not (Get-Command sqlcmd -ErrorAction SilentlyContinue)) {
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "##vso[task.prependpath]/opt/mssql-tools18/bin"
        }

  - task: PowerShell@2
    displayName: Deploy database scripts
    inputs:
      filePath: $(Build.SourcesDirectory)/StudentManagement.Database/deploy/Deploy-Database.ps1
      arguments: >-
        -Server "${{ parameters.sqlServer }}"
        -Database "${{ parameters.sqlDatabase }}"
        -Username "${{ parameters.sqlUsername }}"
        -Password "${{ parameters.sqlPassword }}"
      pwsh: true

  - task: AzureCLI@2
    displayName: Remove agent IP from SQL Server firewall
    condition: and(always(), ne('${{ parameters.azureServiceConnection }}', ''), ne('${{ parameters.sqlResourceGroup }}', ''), ne(variables['sqlFirewallRuleName'], ''))
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        az sql server firewall-rule delete `
          --resource-group '${{ parameters.sqlResourceGroup }}' `
          --server '$(sqlServerShortName)' `
          --name '$(sqlFirewallRuleName)'
        Write-Host "Removed firewall rule $(sqlFirewallRuleName)"
