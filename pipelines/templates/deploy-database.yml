parameters:
  - name: azureServiceConnection
    type: string
    default: 'StudentManagement-Azure'

steps:
  - task: AzureCLI@2
    displayName: Open SQL firewall for pipeline agent
    condition: succeeded()
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $ErrorActionPreference = 'Stop'
        $sqlServer = '$(sqlServer)'

        if ($sqlServer -notmatch 'database\.windows\.net') {
          Write-Host "Not Azure SQL - skipping firewall management."
          Write-Host "##vso[task.setvariable variable=sqlFirewallManaged]false"
          exit 0
        }

        $agentIp = (Invoke-RestMethod -Uri 'https://api.ipify.org?format=text').Trim()
        $serverName = $sqlServer.Split('.')[0]
        $resourceGroup = '$(sqlResourceGroup)'.Trim()
        $ruleName = "ado-build-$(Build.BuildId)"

        if ([string]::IsNullOrWhiteSpace($resourceGroup)) {
          Write-Host "sqlResourceGroup not set. Looking up resource group for server '$serverName'..."
          $resourceGroup = az sql server list --query "[?name=='$serverName'].resourceGroup | [0]" -o tsv
        }

        if ([string]::IsNullOrWhiteSpace($resourceGroup)) {
          throw @"
Could not resolve resource group for SQL server '$serverName'.
Add 'sqlResourceGroup' to your variable group, OR grant 'Reader' on the subscription to the service connection.
"@
        }

        Write-Host "Agent IP: $agentIp"
        Write-Host "Resource group: $resourceGroup"
        Write-Host "SQL server: $serverName"
        Write-Host "Firewall rule: $ruleName"

        az sql server firewall-rule create `
          --resource-group $resourceGroup `
          --server $serverName `
          --name $ruleName `
          --start-ip-address $agentIp `
          --end-ip-address $agentIp

        if ($LASTEXITCODE -ne 0) {
          throw @"
Failed to create SQL firewall rule.
Grant 'SQL Server Contributor' on server '$serverName' (or its resource group) to service connection '${{ parameters.azureServiceConnection }}'.
Portal: SQL Server -> Networking -> add IP $agentIp manually to test.
"@
        }

        Write-Host "##vso[task.setvariable variable=sqlFirewallManaged]true"
        Write-Host "##vso[task.setvariable variable=sqlFirewallRuleName]$ruleName"
        Write-Host "##vso[task.setvariable variable=sqlServerShortName]$serverName"
        Write-Host "##vso[task.setvariable variable=sqlResourceGroupResolved]$resourceGroup"
        Write-Host "Waiting 15 seconds for firewall rule to propagate..."
        Start-Sleep -Seconds 15

  - task: PowerShell@2
    displayName: Install sqlcmd (Linux)
    condition: and(succeeded(), eq(variables['Agent.OS'], 'Linux'))
    inputs:
      targetType: inline
      script: |
        if (-not (Get-Command sqlcmd -ErrorAction SilentlyContinue)) {
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "##vso[task.prependpath]/opt/mssql-tools18/bin"
        }

  - task: PowerShell@2
    displayName: Deploy database scripts
    condition: succeeded()
    env:
      SQL_PASSWORD: $(sqlPassword)
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $ErrorActionPreference = 'Stop'
        $sqlServer = "$(sqlServer)"

        if ($sqlServer -match 'database\.windows\.net' -and '$(sqlFirewallManaged)' -ne 'true') {
          throw "Azure SQL firewall was not opened for this agent. Fix the 'Open SQL firewall for pipeline agent' step first."
        }

        $params = @{
          Server   = $sqlServer
          Database = "$(sqlDatabase)"
          Username = "$(sqlUsername)"
          Password = $env:SQL_PASSWORD
        }

        if ($sqlServer -match 'database\.windows\.net') {
          $params.TrustServerCertificate = $true
        }

        & "$(Build.SourcesDirectory)/StudentManagement.Database/deploy/Deploy-Database.ps1" @params

  - task: AzureCLI@2
    displayName: Close SQL firewall for pipeline agent
    condition: and(always(), eq(variables['sqlFirewallManaged'], 'true'), ne(variables['sqlFirewallRuleName'], ''))
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $ErrorActionPreference = 'Continue'
        az sql server firewall-rule delete `
          --resource-group "$(sqlResourceGroupResolved)" `
          --server "$(sqlServerShortName)" `
          --name "$(sqlFirewallRuleName)"
        Write-Host "Removed firewall rule $(sqlFirewallRuleName)"
